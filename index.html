<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Sensor Jarak</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background-color: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 300px;
        }
        h2 {
            margin-top: 0;
            color: #333;
            font-size: 24px;
        }
        .distance-display {
            font-size: 56px;
            font-weight: bold;
            color: #007BFF;
            margin: 20px 0;
        }
        .unit {
            font-size: 24px;
            color: #666;
        }
        .status {
            font-size: 14px;
            color: #28a745;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Monitoring Jarak</h2>
        <div class="distance-display">
            <span id="nilai_jarak">--</span><span class="unit"> cm</span>
        </div>
        <div class="status" id="status_koneksi">Menghubungkan ke database...</div>
    </div>

    <script>
        // =========================================================
        // MASUKKAN KONFIGURASI FIREBASE ANDA DI SINI
        // =========================================================
        const firebaseConfig = {
            apiKey: "AIzaSyAACz3xFoNyatV7xCH4_5If7LWg_zuR5nU",
            authDomain: "cobacoba-bac67.firebaseapp.com",
            databaseURL: "https://cobacoba-bac67-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "cobacoba-bac67",
            storageBucket: "cobacoba-bac67.firebasestorage.app",
            messagingSenderId: "667992657023",
            appId: "1:667992657023:web:ba819d1984e4a403fc834a"
        };

        // Inisialisasi Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Referensi ke path yang sama dengan ESP32 ("/sensor/jarak")
        const sensorRef = database.ref('/sensor/jarak');

        // Mengambil data secara real-time
        sensorRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data !== null) {
                document.getElementById('nilai_jarak').innerText = data.toFixed(1);
                document.getElementById('status_koneksi').innerText = "Live (Real-time)";
                document.getElementById('status_koneksi').style.color = "#28a745";
            }
        }, (error) => {
            console.error("Error Firebase:", error);
            document.getElementById('status_koneksi').innerText = "Gagal terhubung ke database!";
            document.getElementById('status_koneksi').style.color = "red";
        });
    </script>
</body>
</html>
