<!DOCTYPE HTML>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard Firebase VL6180X</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, sans-serif; text-align: center; background-color: #f0f2f5; margin: 0; padding: 20px; }
    .container { background: white; max-width: 400px; margin: auto; padding: 30px 20px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    h2 { color: #1a73e8; margin-top: 0; }
    .status { font-size: 0.9rem; font-weight: bold; padding: 10px; border-radius: 5px; margin-bottom: 20px; background-color: #e8f0fe; color: #1967d2; }
    .data-jarak { font-size: 5rem; font-weight: bold; color: #202124; margin: 10px 0; }
    .unit { font-size: 1.5rem; color: #5f6368; }
    .notif { padding: 15px; border-radius: 8px; font-weight: bold; transition: 0.3s; margin-top: 20px; }
    .aman { background-color: #ceead6; color: #0d652d; border: 1px solid #a8dab5; }
    .awas { background-color: #fad2cf; color: #a50e0e; border: 1px solid #f6aca6; }
  </style>
</head>
<body>

  <div class="container">
    <h2>Pemantau Sensor (Firebase)</h2>
    <div id="statusKoneksi" class="status">Menghubungkan ke Firebase...</div>
    
    <div class="data-jarak"><span id="jarak">--</span><span class="unit">cm</span></div>
    <div class="notif aman" id="notifBox">Menunggu Data...</div>
  </div>

  <script type="module">
    // Import fungsi Firebase
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // MASUKKAN DATA FIREBASE ANDA DI SINI
    const firebaseConfig = {
      apiKey: "AIzaSyAACz3xFoNyatV7xCH4_5If7LWg_zuR5nU",
      databaseURL: "https://cobacoba-bac67-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "cobacoba-bac67"
    };

    // Inisialisasi Firebase
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    
    // Targetkan ke folder data sensor di database
    const sensorRef = ref(db, 'sensor_vl6180x');

    document.getElementById('statusKoneksi').innerHTML = "🟢 Terhubung ke Firebase Realtime Database!";

    // Mendengarkan perubahan data secara otomatis (Real-time)
    onValue(sensorRef, (snapshot) => {
      const data = snapshot.val();
      
      if (data) {
        // Update angka jarak
        document.getElementById("jarak").innerHTML = data.jarak;
        
        // Update notifikasi
        const box = document.getElementById("notifBox");
        if (data.status_masuk) {
          box.innerHTML = "⚠️ OBJEK MEMASUKI AREA (<= 19cm)";
          box.className = "notif awas";
        } else {
          box.innerHTML = "Objek di luar area (> 19cm)";
          box.className = "notif aman";
        }
      }
    });
  </script>

</body>
</html>
